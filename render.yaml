services:
  - type: web
    name: pet-trash-liberation
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: pet-trash-db
          property: connectionString
    disk:
      name: media-files
      mountPath: /opt/render/project/src/media
      sizeGB: 5

databases:
  - name: pet-trash-db
    plan: free
